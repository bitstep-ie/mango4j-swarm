spring:
  application:
    name: mango4j-reference-email-app

  datasource:
    url: jdbc:postgresql://localhost:5432/mango_reference
    username: mango
    password: mango

  flyway:
    # The application owns schema and table creation. This example ships
    # its own migration under classpath:db/migration.
    init-sqls: CREATE SCHEMA IF NOT EXISTS mango_reference
    default-schema: mango_reference
    schemas: mango_reference
    locations: classpath:db/migration

  jpa:
    properties:
      hibernate.default_schema: mango_reference

mango:
  swarm:
    enabled: true
    database:
      schema: mango_reference
    worker:
      heartbeat-interval: 5s
      stale-after: 20s
    executor:
      max-threads: 16
      poll-interval: 250ms
      virtual-threads: auto
    retry:
      base-delay: 5s
      multiplier: 2.0
      max-delay: 30m
    task-types:
      send-email:
        rate: 100
        period: 1s
        concurrency: 5
        timeout: 30s
        reclaim-on-timeout: true
        idempotent: true
        max-attempts: 3
        retry-base-delay: 5s
        retry-multiplier: 2.0
        retry-max-delay: 30m

reference:
  email:
    seed-on-startup: true
    seed-count: 2000
